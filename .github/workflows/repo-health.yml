name: Repo Health

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-health:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Review Server Smoke
        run: python -m web.review_server --help

      - name: Unit Tests
        run: |
          python -m unittest \
            web.test_review_lib \
            web.test_review_server \
            scripts.tests.test_server_batch_tools \
            scripts.tests.test_research_arena_v15_layer_adapter \
            scripts.tests.test_adapter_template

      - name: Frontend Inline JS Smoke
        run: python scripts/check_index_html_inline_js.py
